services:
  agent_core:
    build:
      context: .
    env_file:
      - an-api.env
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      CHROMA_PATH: /app/chroma_data
      SKILLS_DIR: /app/skills
      SQLITE_DB_PATH: /app/test.db
      CHECKPOINT_DB_PATH: /app/checkpoints.db
      PUBLISHED_SITES_DIR: /app/published_sites
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      AGENT_MAX_REACT_ITERATIONS: ${AGENT_MAX_REACT_ITERATIONS:-16}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-16384}
      AGENT_RATE_LIMIT_RETRIES: ${AGENT_RATE_LIMIT_RETRIES:-2}
      AGENT_RATE_LIMIT_BASE_DELAY: ${AGENT_RATE_LIMIT_BASE_DELAY:-15}
      AGENT_BOOTSTRAP_SESSION: ${AGENT_BOOTSTRAP_SESSION:-false}
      AGENT_USE_HYBRID_MEMORY: ${AGENT_USE_HYBRID_MEMORY:-true}
    volumes:
      - ./skills:/app/skills
      - ./chroma_data:/app/chroma_data
      - ./published_sites:/app/published_sites
    depends_on:
      - neo4j
    networks:
      - agent_internal
    # Resource limits: prevent runaway tasks from consuming the host
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    # Drop capabilities not needed for a web service
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - agent_internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

networks:
  agent_internal:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
